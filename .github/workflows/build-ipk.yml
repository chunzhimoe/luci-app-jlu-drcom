name: Build OpenWrt IPK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - 'Makefile'
      - 'files/**'
      - '.github/workflows/build-ipk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # OpenWrt SDK for mediatek/filogic (package arch: aarch64_cortex-a53)
      SDK_URL: https://downloads.openwrt.org/releases/23.05.5/targets/mediatek/filogic/openwrt-sdk-23.05.5-mediatek-filogic_gcc-12.3.0_musl.Linux-x86_64.tar.xz
      PACKAGE_NAME: luci-app-jlu-drcom

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3-setuptools rsync swig unzip zlib1g-dev file wget

      - name: Download and extract OpenWrt SDK
        run: |
          wget -qO /tmp/sdk.tar.xz "$SDK_URL"
          mkdir -p /opt/openwrt-sdk
          tar -xf /tmp/sdk.tar.xz -C /opt/openwrt-sdk
          SDK_DIR="/opt/openwrt-sdk/$(tar -tf /tmp/sdk.tar.xz | head -n1 | cut -d/ -f1)"
          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"

      - name: Prepare feeds and package source
        run: |
          cd "$SDK_DIR"
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          mkdir -p package/custom
          cp -r "$GITHUB_WORKSPACE" "package/custom/$PACKAGE_NAME"

      - name: Build po2lmo host tool
        run: |
          cd "$SDK_DIR"
          make defconfig
          make package/feeds/luci/luci-base/host/compile V=s
          # po2lmo is installed to staging_dir/hostpkg/bin/ but Makefile expects staging_dir/host/bin/
          if [ ! -f "$SDK_DIR/staging_dir/host/bin/po2lmo" ]; then
            cp "$SDK_DIR/staging_dir/hostpkg/bin/po2lmo" "$SDK_DIR/staging_dir/host/bin/po2lmo"
            echo "po2lmo copied from hostpkg/bin to host/bin"
          fi
          echo "po2lmo ready at: $SDK_DIR/staging_dir/host/bin/po2lmo"

      - name: Build package
        run: |
          cd "$SDK_DIR"
          make package/custom/$PACKAGE_NAME/compile V=s -j"$(nproc)"

      - name: Collect artifacts
        run: |
          mkdir -p "$GITHUB_WORKSPACE/artifacts"
          echo "=== Searching for built IPK files ==="
          find "$SDK_DIR/bin" -type f -name "*.ipk" | tee /tmp/all_ipks.txt
          echo "=== Copying package IPKs ==="
          grep "$PACKAGE_NAME" /tmp/all_ipks.txt | while read f; do
            echo "Found: $f"
            cp "$f" "$GITHUB_WORKSPACE/artifacts/"
          done
          # Fallback: search entire SDK bin dir
          if [ -z "$(ls -A "$GITHUB_WORKSPACE/artifacts")" ]; then
            echo "No IPK found by name, listing all bin/ contents:"
            find "$SDK_DIR/bin" -type f | head -50
          fi
          ls -lh "$GITHUB_WORKSPACE/artifacts"

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PACKAGE_NAME }}-ipk
          path: artifacts/*.ipk
          if-no-files-found: error
